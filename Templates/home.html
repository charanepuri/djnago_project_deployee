<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">

        <title>Employee Management | Responsive</title>

        <style>
            /* Base Styles */
            body {
                font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
                background-color: #f0f2f5;
                margin: 0;
                padding: 20px; /* Reduced padding for mobile */
                color: #333;
            }

            h1 {
                text-align: center;
                color: #2c3e50;
                margin-bottom: 30px;
                font-size: 1.8rem;
            }

            /* Responsive Table Container */
            .table-container {
                width: 100%;
                overflow-x: auto; /* Enables horizontal scroll on small screens */
                margin-bottom: 50px;
                background: #fff;
                border-radius: 8px;
                box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            }

            table {
                width: 100%;
                border-collapse: collapse;
                min-width: 600px; /* Ensures table doesn't look squashed */
            }

            th {
                background-color: #4a90e2;
                color: white;
                padding: 15px;
                text-align: left;
                white-space: nowrap;
            }

            td {
                padding: 12px 15px;
                border-bottom: 1px solid #eee;
            }

            /* Form Styling */
            form {
                background: #fff;
                width: 90%;
                max-width: 500px;
                margin: 0 auto 40px auto;
                padding: 25px;
                border-radius: 8px;
                box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            }

            form p {
                margin-bottom: 15px;
            }

            label {
                display: block;
                font-weight: bold;
                margin-bottom: 5px;
            }

            /* Make inputs take full width */
            input[type="text"], 
            input[type="email"], 
            input[type="tel"], 
            select,
            input[type="number"] {
                width: 100%;
                padding: 12px;
                border: 1px solid #ccc;
                border-radius: 4px;
                box-sizing: border-box; 
                font-size: 16px; /* Prevents iOS zoom-on-focus */
            }

            input[type="submit"] {
                width: 100%;
                background-color: #2c3e50;
                color: white;
                border: none;
                padding: 15px;
                border-radius: 4px;
                cursor: pointer;
                font-size: 16px;
                font-weight: bold;
                margin-top: 10px;
            }

            /* Media Queries for Mobile Devices */
            @media screen and (max-width: 600px) {
                body {
                    padding: 10px;
                }
                
                h1 {
                    font-size: 1.4rem;
                }

                form {
                    width: 100%;
                    padding: 15px;
                }

                /* Optional: Hide less important columns on mobile */
                .hide-mobile {
                    display: none;
                }
            }
        </style>

    </head>

    <body>
        <h1>Employee Records</h1>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>NAME</th>
                        <th>EMAIL</th>
                        <th class="hide-mobile">PHONE</th>
                        <th>DEPARTMENT</th>
                    </tr>
                </thead>
                <tbody>
                    {% for x in data %}
                    <tr>
                        <td>{{x.name}}</td>
                        <td>{{x.email}}</td>
                        <td class="hide-mobile">{{x.phone}}</td>
                        <td>{{x.department}}</td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>

        <form action="" method="post">
            {% csrf_token %}
            <h2 style="text-align: center; margin-top: 0;">Add Employee</h2>
            {{ form.as_p }}
            <input type="submit" value="Register Employee">
        </form>
    
    </body>
</html>
